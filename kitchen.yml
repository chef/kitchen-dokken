---
driver:
  name: dokken
  privileged: true
  chef_image: chef/chef-hab
  chef_version: unstable

provisioner:
  name: dokken
  deprecations_as_errors: true
  chef_license: accept-no-persist
  chef_license_server:
    - http://hosted-license-service-lb-8000-606952349.us-west-2.elb.amazonaws.com:8000/

transport:
  name: dokken

platforms:
  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update

  - name: almalinux-9
    driver:
      image: dokken/almalinux-9
      pid_one_command: /usr/lib/systemd/systemd

verifier:
  name: inspec

suites:
  - name: default
    includes:
      - almalinux-9
    run_list:
      - recipe[dokken_test::default]
    attributes:
      dokken_test:
        revision: <%= `git rev-parse HEAD` %>

  - name: idempotency
    includes:
      - almalinux-9
    provisioner:
      enforce_idempotency: true
      multiple_converge: 2
      deprecations_as_errors: true
    run_list:
      - recipe[dokken_test::default]

  - name: hello
    driver:
      entrypoint:
        - /bin/sh
        - -c
        - while :; do nc -lvp 1234 -e /bin/sh -c 'echo hello'; done
      hostname: hello.computers.biz
      ports: '1234'
      pid_one_command: ''
    includes:
      - hello

  - name: helloagain
    driver:
      hostname: helloagain.computers.biz
      ports:
        - '8301'
        - '8301:8301/udp'
        - '127.0.0.1:8500:8500'
    includes:
      - hello

  - name: local_image
    includes:
      - local_image

  - name: ipv6
    includes:
      - almalinux-9
    driver:
      ipv6: true

  - name: bridge
    driver:
      network_mode: bridge

  - name: host
    driver:
      network_mode: host
